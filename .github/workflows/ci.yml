name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest

    outputs:
      coverage: ${{ steps.unit-tests-backend-id.outputs.report }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: ./bugtracker-backend/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest
      
      - name: Execute Backend Unit Tests
        id: unit-tests-backend-id
        working-directory: ./bugtracker-backend
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee output.txt
          cat output.txt | go-junit-report > test-results.xml
          go tool cover -func=coverage.out > coverage.txt
          {
            echo "### Backend Test Coverage Report ###"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "report<<EOF"
            column -t coverage.txt
            echo "EOF" 
          } >> $GITHUB_OUTPUT
          
      - name: Publish Backend Test Results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Backend Unit Tests Report
          path: ./bugtracker-backend/test-results.xml
          reporter: java-junit

  unit-tests-frontend:
    runs-on: ubuntu-latest

    outputs:
      coverage: ${{ steps.unit-tests-frontend-id.outputs.report }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./bugtracker-frontend/package-lock.json

      - name: Execute Frontend Unit Tests
        id: unit-tests-frontend-id
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test | tee full_output.txt

          {
            echo "### Frontend Test Coverage Report ###"
            echo '```'
            cat full_output.txt
            echo '```' 
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "report<<EOF"
            cat full_output.txt
            echo "EOF" 
          } >> $GITHUB_OUTPUT

      - name: Publish Frontend Test Results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Frontend Unit Tests Report
          path: ./bugtracker-frontend/test-results.xml
          reporter: java-junit

  create-coverage-comment:
    if: github.event_name == 'pull_request'
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create Backend Coverage Comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Test Coverage Report ##
            ```
            ${{ needs.unit-tests-backend.outputs.coverage }}
            ```

      - name: Create Frontend Coverage Comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Frontend Test Coverage Report ##
            ```
            ${{ needs.unit-tests-frontend.outputs.coverage }}
            ```
  api-e2e-tests:
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Launch Application
        run: |
          docker compose up --build -d
          npx wait-port http://localhost:8080/api/health -t 30000
          
      - name: Run API Tests
        working-directory: ./tests-api
        run: |
          npm ci
          npx playwright install
          npx playwright test

      - name: Run E2E Tests
        working-directory: ./tests-e2e
        env:
          CI: "1"  # Just in case the config file does not have the headless mode by default
        run: |
          npm ci
          npx playwright test

      - name: Shutdown Application
        run: docker compose down

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API Test Results
          path: ./tests-api/test-results
          retention-days: 5

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E Test Results
          path: ./tests-e2e/test-results
          retention-days: 5

      - name: Upload API Test Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API Test Playwright Report
          path: ./tests-api/playwright-report
          retention-days: 5

      - name: Upload E2E Test Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E Test Playwright Report
          path: ./tests-e2e/playwright-report
          retention-days: 5

      - name: Publish API Test Results
        if: always()
        uses: dorny/test-reporter@v3
        with: 
          name: API Tests Report
          path: ./tests-api/test-results/results.xml
          reporter: java-junit

      - name: Publish E2E Test Results
        if: always()
        uses: dorny/test-reporter@v3
        with: 
          name: E2E Tests Report
          path: ./tests-e2e/test-results/results.xml
          reporter: java-junit

  deploy-playwright-reports:
    if: always()
    needs: api-e2e-tests

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download API Playwright Report
        uses: actions/download-artifact@v4
        with:
          name: API Test Playwright Report
          path: site/api

      - name: Download E2E Playwright Report
        uses: actions/download-artifact@v4
        with:
          name: E2E Test Playwright Report
          path: site/e2e

      - name: Create Landing Page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Playwright Reports</title>
          </head>
          <body>
            <h1>Playwright Reports</h1>
            <ul>
              <li><a href="./api/">API Test Report</a></li>
              <li><a href="./e2e/">E2E Test Report</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Reports to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
          