name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest

    outputs:
      coverage: ${{ steps.unit-tests-backend-id.outputs.report }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: ./bugtracker-backend/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest
      
      - name: Execute Backend Unit Tests
        id: unit-tests-backend-id
        working-directory: ./bugtracker-backend
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 | tee output.txt
          cat output.txt | go-junit-report > test-results.xml
          go tool cover -func=coverage.out > coverage.txt
          {
            echo "### Backend Test Coverage Report ###"
            echo '```'
            cat coverage.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "report<<EOF"
            column -t coverage.txt
            echo "EOF" 
          } >> $GITHUB_OUTPUT
          
      - name: Publish Backend Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Unit Tests Report
          path: ./bugtracker-backend/test-results.xml
          reporter: java-junit

  unit-tests-frontend:
    runs-on: ubuntu-latest

    outputs:
      coverage: ${{ steps.unit-tests-frontend-id.outputs.report }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./bugtracker-frontend/package-lock.json

      - name: Execute Frontend Unit Tests
        id: unit-tests-frontend-id
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test | tee full_output.txt

          {
            echo "### Frontend Test Coverage Report ###"
            echo '```'
            cat full_output.txt
            echo '```' 
          } >> $GITHUB_STEP_SUMMARY

          {
            echo "report<<EOF"
            cat full_output.txt
            echo "EOF" 
          } >> $GITHUB_OUTPUT

      - name: Publish Frontend Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Unit Tests Report
          path: ./bugtracker-frontend/test-results.xml
          reporter: java-junit

  create-coverage-comment:
    if: github.event_name == 'pull_request'
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create Backend Coverage Comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Test Coverage Report ##
            ```
            ${{ needs.unit-tests-backend.outputs.coverage }}
            ```

      - name: Create Frontend Coverage Comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Frontend Test Coverage Report ##
            ```
            ${{ needs.unit-tests-frontend.outputs.coverage }}
            ```