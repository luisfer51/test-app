name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: ./bugtracker-backend/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest
      
      - name: Run Backend Unit Tests
        working-directory: bugtracker-backend
        run: |
          go test -v ./... 2>&1 | go-junit-report > test-results.xml
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -html=coverage.out -o coverage.html
          mkdir -p reports
          mv coverage.html reports/

      - name: Publish Backend Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Unit Tests Report
          path: bugtracker-backend/test-results.xml
          reporter: java-junit

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: bugtracker-backend/reports/coverage.html

  unit-tests-frontend:
    needs: unit-tests-backend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./bugtracker-frontend/package-lock.json

      - name: Execute Frontend Unit unit-tests
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test

      - name: Publish Frontend Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Unit Tests Report
          path: ./bugtracker-frontend/test-results.xml
          reporter: jest-junit