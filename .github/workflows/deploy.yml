name: Deploy

on:
  workflow_dispatch:

env:
  PROJECT_ID: bugtracker-demo
  REGION: southamerica-west1

jobs:
  verify-gcp-access:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Authentication
        run: |
          gcloud auth list

      - name: Verify Artifact Registry Access
        run: |
          gcloud artifacts repositories list \
            --location=$REGION

      - name: Configure Docker
        run: |
          gcloud auth configure-docker southamerica-west1-docker.pkg.dev --quiet

      - name: Build Backend Image
        working-directory: ./bugtracker-backend
        run: |
          docker build \
            -t southamerica-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/bugtracker-repo/backend:${{ github.sha }} \
            .